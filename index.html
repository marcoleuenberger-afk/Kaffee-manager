<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kaffee Manager Pro Cloud</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-100 text-gray-800 flex justify-center p-2 antialiased font-sans">

  <div id="root" class="w-full max-w-md"></div>

  <!-- Supabase als eigenständiges Modul laden, damit Babel nicht hineinfuscht -->
  <script type="module">
    import { createClient } from 'https://unpkg.com/@supabase/supabase-js@2/+esm'
    
    const SUPABASE_URL = "https://bjxhuwwxaiduklbxosgf.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJqeGh1d3d4YWlkdWtsYnhvc2dmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyOTk1MjUsImV4cCI6MjA5Nzg3NTUyNX0.KDHwhz83Z-TxZUDadNlKsbQNmMFxtZViEZDdOUawtVQ";
    
    // Global für unser React-Skript verfügbar machen
    window.supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  </script>

  <!-- React App Code -->
  <script type="text/babel">
    function App() {
      const [activeTab, setActiveTab] = React.useState('input');
      const [prices, setPrices] = React.useState({ espresso: 3.5, schale: 5.3 });
      const [users, setUsers] = React.useState([]);
      const [loading, setLoading] = React.useState(true);
      const [errorMsg, setErrorMsg] = React.useState(null);

      React.useEffect(() => {
        // Kurz warten, bis das Modul oben geladen und im window registriert ist
        const checkSupabase = setInterval(() => {
          if (window.supabase) {
            clearInterval(checkSupabase);
            fetchData();
          }
        }, 50);
        return () => clearInterval(checkSupabase);
      }, []);

      const fetchData = async () => {
        try {
          setLoading(true);
          setErrorMsg(null);
          
          const { data: preiseData, error: preiseError } = await window.supabase.from('kaffee_preise').select('*');
          if (preiseError) throw preiseError;
          
          if (preiseData && preiseData.length > 0) {
            const preiseObj = {};
            preiseData.forEach(p => { preiseObj[p.id] = parseFloat(p.preis); });
            setPrices(preiseObj);
          }

          const { data: usersData, error: usersError } = await window.supabase.from('kaffee_users').select('*').order('sort_order', { ascending: true });
          if (usersError) throw usersError;
          
          if (usersData) {
            const mappedUsers = usersData.map(u => ({
              id: u.id,
              name: u.name,
              rundenAnwesend: u.runden_anwesend || 0,
              rundenBezahlt: u.runden_bezahlt || 0,
              espresso: u.espresso || 0,
              schale: u.schale || 0
            }));
            setUsers(mappedUsers);
          }
        } catch (error) {
          console.error("Fehler:", error.message);
          setErrorMsg(error.message);
        } finally {
          setLoading(false);
        }
      };

      const handlePriceChange = async (type, val) => {
        const neuerPreis = parseFloat(val) || 0;
        setPrices(prev => ({ ...prev, [type]: neuerPreis }));
        await window.supabase.from('kaffee_preise').update({ preis: neuerPreis }).eq('id', type);
      };

      const handleNameChange = async (id, newName) => {
        setUsers(prev => prev.map(u => u.id === id ? { ...u, name: newName } : u));
        await window.supabase.from('kaffee_users').update({ name: newName }).eq('id', id);
      };

      const updateCounter = async (id, field, delta) => {
        let dbField = "";
        if (field === "rundenAnwesend") dbField = "runden_anwesend";
        if (field === "rundenBezahlt") dbField = "runden_bezahlt";
        if (field === "espresso") dbField = "espresso";
        if (field === "schale") dbField = "schale";

        const currentUser = users.find(u => u.id === id);
        if (!currentUser) return;

        const neuerWert = Math.max(0, currentUser[field] + delta);
        setUsers(prev => prev.map(u => u.id === id ? { ...u, [field]: neuerWert } : u));

        await window.supabase.from('kaffee_users').update({ [dbField]: neuerWert }).eq('id', id);
      };

      const processedUsers = users.map(u => {
        const kosten = (u.espresso * prices.espresso) + (u.schale * prices.schale);
        const quote = u.rundenAnwesend > 0 ? (u.rundenBezahlt / u.rundenAnwesend) * 100 : 0;
        const avgProAnwesendeRunde = u.rundenAnwesend > 0 ? kosten / u.rundenAnwesend : 0;
        return { ...u, kosten, quote, avgProAnwesendeRunde };
      });

      const gesamtAusgaben = processedUsers.reduce((sum, u) => sum + u.kosten, 0);
      const totalAnwesenheiten = processedUsers.reduce((sum, u) => sum + u.rundenAnwesend, 0);
      const activeUsers = processedUsers.filter(u => u.rundenAnwesend > 0);
      
      const usersWithSollQuote = activeUsers.map(u => {
        const totalBezahltAlle = processedUsers.reduce((sum, usr) => sum + usr.rundenBezahlt, 0);
        const erwarteteRundenBezahlt = totalBezahltAlle * (u.rundenAnwesend / (totalAnwesenheiten || 1));
        const individuelleSollQuoteInProzent = u.rundenAnwesend > 0 ? (erwarteteRundenBezahlt / u.rundenAnwesend) * 100 : 0;
        const abweichung = u.quote - individuelleSollQuoteInProzent;
        return { ...u, individuelleSollQuoteInProzent, abweichung };
      });

      const qualifiedUsers = usersWithSollQuote.filter(u => u.rundenAnwesend >= 10);
      const generalQualifiedForAwards = processedUsers.filter(u => u.rundenAnwesend >= 10);

      const top3Dringlichkeit = [...qualifiedUsers].sort((a, b) => a.abweichung - b.abweichung).slice(0, 3);

      const getTopUser = (field) => {
        return generalQualifiedForAwards.length > 0
          ? generalQualifiedForAwards.reduce((maxUser, u) => u[field] > maxUser[field] ? u : maxUser, generalQualifiedForAwards[0])
          : (processedUsers[0] || { name: '-', rundenBezahlt: 0, kosten: 0, rundenAnwesend: 0 });
      };
      
      const goenner = getTopUser('rundenBezahlt');
      const dauerGast = getTopUser('rundenAnwesend');

      const pechvogel = qualifiedUsers.length > 0 
        ? qualifiedUsers.reduce((maxUser, u) => u.quote > maxUser.quote ? u : maxUser, qualifiedUsers[0])
        : (processedUsers[0] || { name: '-', quote: 0 });

      const finanzStabilitaetUser = qualifiedUsers.length > 0
        ? qualifiedUsers.reduce((closest, u) => {
            return Math.abs(u.abweichung) < Math.abs(closest.abweichung) ? u : closest;
          }, qualifiedUsers[0])
        : null;

      if (errorMsg) {
        return (
          <div class="p-4 bg-red-50 text-red-700 rounded-2xl border border-red-200 my-4 text-xs max-w-sm mx-auto">
            <p class="font-bold mb-1">Datenbank-Verbindungsfehler:</p>
            <p class="font-mono bg-white p-2 rounded border border-red-100 mb-2">{errorMsg}</p>
            <button onClick={fetchData} class="w-full py-1.5 bg-red-600 text-white rounded font-bold">Erneut versuchen</button>
          </div>
        );
      }

      if (loading) {
        return (
          <div class="flex flex-col items-center justify-center h-screen text-amber-600 font-semibold gap-2">
            <span class="animate-spin text-2xl">☕</span> Lade Live-Daten aus der Cloud...
          </div>
        );
      }

      return (
        <div class="w-full bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-200 my-2 flex flex-col h-[95vh]">
          
          {/* Header */}
          <div class="p-4 bg-gray-50 text-center border-b border-gray-200 shrink-0">
            <h1 class="text-xl font-bold text-amber-600 flex items-center justify-center gap-2">
              ☁️ Kaffee Manager Pro Cloud
            </h1>
            
            <div class="grid grid-cols-2 gap-2 mt-3 bg-gray-200 p-1 rounded-xl">
              <button onClick={() => setActiveTab('input')} class={`py-2 text-xs font-semibold rounded-lg transition-all ${activeTab === 'input' ? 'bg-white text-gray-900 shadow-sm' : 'text-gray-600'}`}>
                📋 Input
              </button>
              <button onClick={() => setActiveTab('stats')} class={`py-2 text-xs font-semibold rounded-lg transition-all ${activeTab === 'stats' ? 'bg-amber-600 text-white shadow-sm' : 'text-gray-600'}`}>
                📊 Stats
              </button>
            </div>
          </div>

          {/* Content */}
          <div class="flex-1 overflow-y-auto p-4 space-y-4 bg-gray-50/50">
            {activeTab === 'input' && (
              <>
                {/* Preise */}
                <div class="bg-white p-3 rounded-2xl border border-gray-200 flex justify-around text-xs shadow-sm">
                  <div class="flex items-center gap-2">
                    <span class="text-amber-600 font-semibold">Espresso:</span>
                    <input type="number" step="0.1" value={prices.espresso} onChange={(e) => handlePriceChange('espresso', e.target.value)} class="w-12 bg-gray-50 border border-gray-300 rounded text-center font-bold text-gray-800 py-0.5" />
                    <span class="text-gray-500">CHF</span>
                  </div>
                  <div class="flex items-center gap-2">
                    <span class="text-amber-800 font-semibold">Schale:</span>
                    <input type="number" step="0.1" value={prices.schale} onChange={(e) => handlePriceChange('schale', e.target.value)} class="w-12 bg-gray-50 border border-gray-300 rounded text-center font-bold text-gray-800 py-0.5" />
                    <span class="text-gray-500">CHF</span>
                  </div>
                  <button onClick={fetchData} class="text-xs px-2 py-0.5 bg-gray-200 text-gray-600 rounded hover:bg-gray-300 transition-all">🔄 Sync</button>
                </div>

                {/* Personen */}
                {users.map((user) => (
                  <div key={user.id} class="bg-white p-4 rounded-2xl border border-gray-200 space-y-3 shadow-sm">
                    <input type="text" value={user.name} onChange={(e) => handleNameChange(user.id, e.target.value)} class="bg-transparent font-bold text-base text-gray-900 border-b border-transparent focus:border-amber-500 focus:outline-none w-full pb-1" />
                    
                    <div class="grid grid-cols-2 gap-3 text-xs">
                      <div class="bg-gray-50 p-2 rounded-xl border border-gray-100 flex flex-col items-center justify-between">
                        <span class="text-gray-500 text-[10px] font-bold tracking-wider mb-2">RUNDEN ANWESEND</span>
                        <div class="flex items-center justify-between w-full px-1">
                          <button onClick={() => updateCounter(user.id, 'rundenAnwesend', -1)} class="w-10 h-10 bg-white border border-gray-300 rounded-lg flex items-center justify-center text-lg font-bold shadow-sm active:bg-gray-100 text-gray-600">-</button>
                          <span class="text-sm font-bold text-gray-800">{user.rundenAnwesend}</span>
                          <button onClick={() => updateCounter(user.id, 'rundenAnwesend', 1)} class="w-10 h-10 bg-white border border-gray-300 rounded-lg flex items-center justify-center text-lg font-bold shadow-sm active:bg-gray-100 text-gray-600">+</button>
                        </div>
                      </div>
                      <div class="bg-gray-50 p-2 rounded-xl border border-gray-100 flex flex-col items-center justify-between">
                        <span class="text-gray-500 text-[10px] font-bold tracking-wider mb-2">RUNDEN BEZAHLT</span>
                        <div class="flex items-center justify-between w-full px-1">
                          <button onClick={() => updateCounter(user.id, 'rundenBezahlt', -1)} class="w-10 h-10 bg-white border border-gray-300 rounded-lg flex items-center justify-center text-lg font-bold shadow-sm active:bg-gray-100 text-gray-600">-</button>
                          <span class="text-sm font-bold text-emerald-600">{user.rundenBezahlt}</span>
                          <button onClick={() => updateCounter(user.id, 'rundenBezahlt', 1)} class="w-10 h-10 bg-white border border-gray-300 rounded-lg flex items-center justify-center text-lg font-bold shadow-sm active:bg-gray-100 text-gray-600">+</button>
                        </div>
                      </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3 text-xs">
                      <div class="bg-amber-50/50 p-2 rounded-xl border border-amber-100 flex flex-col items-center justify-between">
                        <span class="text-amber-800 text-[10px] font-bold tracking-wider mb-2">ESPRESSO</span>
                        <div class="flex items-center justify-between w-full px-1">
                          <button onClick={() => updateCounter(user.id, 'espresso', -1)} class="w-10 h-10 bg-white border border-amber-200 rounded-lg flex items-center justify-center text-lg font-bold shadow-sm active:bg-amber-100 text-amber-700">-</button>
                          <span class="text-sm font-bold text-gray-800">{user.espresso}</span>
                          <button onClick={() => updateCounter(user.id, 'espresso', 1)} class="w-10 h-10 bg-white border border-amber-200 rounded-lg flex items-center justify-center text-lg font-bold shadow-sm active:bg-amber-100 text-amber-700">+</button>
                        </div>
                      </div>
                      <div class="bg-orange-50/40 p-2 rounded-xl border border-orange-100 flex flex-col items-center justify-between">
                        <span class="text-amber-900 text-[10px] font-bold tracking-wider mb-2">SCHALE</span>
                        <div class="flex items-center justify-between w-full px-1">
                          <button onClick={() => updateCounter(user.id, 'schale', -1)} class="w-10 h-10 bg-white border border-orange-200 rounded-lg flex items-center justify-center text-lg font-bold shadow-sm active:bg-orange-100 text-amber-900">-</button>
                          <span class="text-sm font-bold text-gray-800">{user.schale}</span>
                          <button onClick={() => updateCounter(user.id, 'schale', 1)} class="w-10 h-10 bg-white border border-orange-200 rounded-lg flex items-center justify-center text-lg font-bold shadow-sm active:bg-orange-100 text-amber-900">+</button>
                        </div>
                      </div>
                    </div>
                  </div>
                ))}
              </>
            )}

            {activeTab === 'stats' && (
              <div class="space-y-4">
                <div class="bg-white p-4 rounded-2xl border border-gray-200 shadow-sm text-center">
                  <span class="text-[10px] text-gray-400 font-bold block tracking-wider">AUSGABEN GESAMT</span>
                  <span class="text-2xl font-black text-emerald-600">{gesamtAusgaben.toFixed(2)} CHF</span>
                </div>

                {top3Dringlichkeit.length > 0 && (
                  <div class="bg-red-50 border border-red-200 p-4 rounded-2xl shadow-sm">
                    <span class="text-xs text-red-700 font-bold block mb-2 tracking-wider">🚨 TOP 3 ZAHLUNGS-DRINGLICHKEIT (Mind. 10 Rnd)</span>
                    <div class="divide-y divide-red-200/60">
                      {top3Dringlichkeit.map((u, index) => (
                        <div key={u.id} class="flex justify-between items-center py-1.5 text-xs first:pt-0 last:pb-0">
                          <span class="font-bold text-gray-800">{index + 1}. {u.name}</span>
                          <span class="font-semibold text-red-600 bg-white px-2 py-0.5 rounded-md border border-red-100">
                            Abw: {u.abweichung >= 0 ? `+${u.abweichung.toFixed(0)}%` : `${u.abweichung.toFixed(0)}%`}
                          </span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* Awards */}
                <div class="bg-white p-4 rounded-2xl border border-gray-200 space-y-3 shadow-sm text-xs">
                  <h3 class="text-xs font-bold text-amber-600 border-b border-gray-100 pb-1.5 tracking-wider">🏅 MEILENSTEINE & FUN-AWARDS (Mind. 10 Rnd)</h3>
                  <div class="grid grid-cols-1 gap-2.5">
                    <div class="bg-gray-50 p-2.5 rounded-xl flex justify-between items-center border border-gray-100">
                      <div>
                        <span class="text-emerald-600 block font-bold text-[10px]">DER GÖNNER</span>
                        <span class="font-bold text-gray-800 text-sm">{goenner.name}</span>
                      </div>
                      <div class="text-right flex flex-col">
                        <span class="text-xs font-semibold text-gray-600 bg-white px-2 py-0.5 rounded-lg border">{goenner.rundenBezahlt} Rnd bezahlt</span>
                        <span class="text-[10px] text-gray-400 font-bold mt-0.5 pr-1">{goenner.kosten ? goenner.kosten.toFixed(2) : '0.00'} CHF</span>
                      </div>
                    </div>

                    <div class="bg-gray-50 p-2.5 rounded-xl flex justify-between items-center border border-gray-100">
                      <div>
                        <span class="text-red-500 block font-bold text-[10px]">PECHVOGEL (Höchste Zahl-Quote)</span>
                        <span class="font-bold text-gray-800 text-sm">{pechvogel.name}</span>
                      </div>
                      <span class="text-xs font-semibold text-gray-600 bg-white px-2 py-1 rounded-lg border">{pechvogel.quote ? pechvogel.quote.toFixed(0) : 0}% Quote</span>
                    </div>
                    
                    {finanzStabilitaetUser && (
                      <div class="bg-gray-50 p-2.5 rounded-xl flex justify-between items-center border border-gray-100">
                        <div>
                          <span class="text-teal-600 block font-bold text-[10px]">FINANZ-STABILITÄT (Am nächsten am Soll von {finanzStabilitaetUser.individuelleSollQuoteInProzent.toFixed(0)}%)</span>
                          <span class="font-bold text-gray-800 text-sm">{finanzStabilitaetUser.name}</span>
                        </div>
                        <span class="text-xs font-semibold text-gray-600 bg-white px-2 py-1 rounded-lg border">
                          {finanzStabilitaetUser.abweichung >= 0 ? `+${finanzStabilitaetUser.abweichung.toFixed(0)}%` : `${finanzStabilitaetUser.abweichung.toFixed(0)}%`} Abw.
                        </span>
                      </div>
                    )}

                    <div class="bg-gray-50 p-2.5 rounded-xl flex justify-between items-center border border-gray-100">
                      <div>
                        <span class="text-purple-600 block font-bold text-[10px]">DER DAUER-GAST (Meiste Kaffeepausen)</span>
                        <span class="font-bold text-gray-800 text-sm">{dauerGast.name}</span>
                      </div>
                      <span class="text-xs font-semibold text-gray-600 bg-white px-2 py-1 rounded-lg border">{dauerGast.rundenAnwesend} Rnd anwesend</span>
                    </div>
                  </div>
                </div>

                {/* Tabelle */}
                <div class="bg-white rounded-2xl border border-gray-200 overflow-hidden shadow-sm text-xs">
                  <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse text-[11px]">
                      <thead>
                        <tr class="bg-gray-50 text-gray-500 uppercase font-bold tracking-wider border-b border-gray-200">
                          <th class="p-2.5 pl-3">Name</th>
                          <th class="p-2.5 text-center">Anw.</th>
                          <th class="p-2.5 text-center">Bez.</th>
                          <th class="p-2.5 text-right">Kosten</th>
                          <th class="p-2.5 text-right pr-3">Ø/Anw</th>
                        </tr>
                      </thead>
                      <tbody class="divide-y divide-gray-100">
                        {processedUsers.map(u => (
                          <tr key={u.id} class="hover:bg-gray-50/60">
                            <td class="p-2.5 pl-3 font-bold text-gray-800">{u.name}</td>
                            <td class="p-2.5 text-center text-gray-600">{u.rundenAnwesend}</td>
                            <td class="p-2.5 text-center">
                              <span class="text-emerald-600 font-bold">{u.rundenBezahlt}</span>
                              <span class="text-gray-400 block text-[9px] font-semibold">{u.quote.toFixed(0)}%</span>
                            </td>
                            <td class="p-2.5 text-right font-bold text-gray-700">{u.kosten.toFixed(2)}</td>
                            <td class="p-2.5 text-right font-semibold text-amber-700 pr-3">{u.avgProAnwesendeRunde.toFixed(2)}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            )}
          </div>

          <div class="p-2 bg-gray-50 text-center text-[10px] text-gray-400 border-t border-gray-200 shrink-0">
            Kaffee Manager Pro v2.0.2 (Cloud-Powered)
          </div>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
