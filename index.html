<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kaffee Manager Pro Cloud</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
</head>
<body class="bg-gray-100 text-gray-800 flex justify-center p-2 antialiased font-sans">

  <div id="root" class="w-full max-w-md">
    <div id="fallback-loader" class="flex flex-col items-center justify-center h-64 text-amber-600 font-semibold gap-2">
      <span class="animate-spin text-3xl">☕</span> Kaffee Manager wird gestartet...
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const SUPABASE_URL = "https://bjxhuwwxaiduklbxosgf.supabase.co";
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJqeGh1d3d4YWlkdWtsYnhvc2dmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyOTk1MjUsImV4cCI6MjA5Nzg3NTUyNX0.KDHwhz83Z-TxZUDadNlKsbQNmMFxtZViEZDdOUawtVQ";
      
      try {
        window.supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      } catch (e) {
        document.getElementById('root').innerHTML = "<div class='p-4 text-red-600 text-center font-bold'>Fehler bei der Client-Erstellung: " + e.message + "</div>";
        return;
      }
      
      const e = React.createElement;

      function App() {
        const [activeTab, setActiveTab] = React.useState('input');
        const [prices, setPrices] = React.useState({ espresso: 3.5, schale: 5.3 });
        const [users, setUsers] = React.useState([]);
        const [loading, setLoading] = React.useState(true);
        const [errorMsg, setErrorMsg] = React.useState(null);

        React.useEffect(() => {
          fetchData();
        }, []);

        const fetchData = async () => {
          try {
            setLoading(true);
            setErrorMsg(null);
            
            // Testverbindung mit Timeout, damit es nicht ewig hängt
            const fetchPreise = window.supabaseClient.from('kaffee_preise').select('*');
            const timeout = new Promise((_, reject) => setTimeout(() => reject(new Error("Zeitüberschreitung bei der Verbindung (Timeout). Prüfe deine Supabase- oder CORS-Einstellungen.")), 6000));
            
            const { data: preiseData, error: preiseError } = await Promise.race([fetchPreise, timeout]);
            if (preiseError) throw preiseError;
            
            if (preiseData && preiseData.length > 0) {
              const preiseObj = {};
              preiseData.forEach(p => { preiseObj[p.id] = parseFloat(p.preis); });
              setPrices(preiseObj);
            }

            const { data: usersData, error: usersError } = await window.supabaseClient.from('kaffee_users').select('*').order('sort_order', { ascending: true });
            if (usersError) throw usersError;
            
            if (usersData) {
              setUsers(usersData.map(u => ({
                id: u.id,
                name: u.name,
                rundenAnwesend: u.runden_anwesend || 0,
                rundenBezahlt: u.runden_bezahlt || 0,
                espresso: u.espresso || 0,
                schale: u.schale || 0
              })));
            }
          } catch (error) {
            console.error(error);
            setErrorMsg(error.message || "Unbekannter Verbindungsfehler");
          } finally {
            setLoading(false);
          }
        };

        const handlePriceChange = async (type, val) => {
          const neuerPreis = parseFloat(val) || 0;
          setPrices(prev => ({ ...prev, [type]: neuerPreis }));
          await window.supabaseClient.from('kaffee_preise').update({ preis: neuerPreis }).eq('id', type);
        };

        const handleNameChange = async (id, newName) => {
          setUsers(prev => prev.map(u => u.id === id ? { ...u, name: newName } : u));
          await window.supabaseClient.from('kaffee_users').update({ name: newName }).eq('id', id);
        };

        const updateCounter = async (id, field, delta) => {
          let dbField = { rundenAnwesend: "runden_anwesend", rundenBezahlt: "runden_bezahlt", espresso: "espresso", schale: "schale" }[field];
          const currentUser = users.find(u => u.id === id);
          if (!currentUser) return;

          const neuerWert = Math.max(0, currentUser[field] + delta);
          setUsers(prev => prev.map(u => u.id === id ? { ...u, [field]: neuerWert } : u));
          await window.supabaseClient.from('kaffee_users').update({ [dbField]: neuerWert }).eq('id', id);
        };

        const processedUsers = users.map(u => {
          const kosten = (u.espresso * prices.espresso) + (u.schale * prices.schale);
          const quote = u.rundenAnwesend > 0 ? (u.rundenBezahlt / u.rundenAnwesend) * 100 : 0;
          return { ...u, kosten, quote, avgProAnwesendeRunde: u.rundenAnwesend > 0 ? kosten / u.rundenAnwesend : 0 };
        });

        const gesamtAusgaben = processedUsers.reduce((sum, u) => sum + u.kosten, 0);
        const totalAnwesenheiten = processedUsers.reduce((sum, u) => sum + u.rundenAnwesend, 0);
        const activeUsers = processedUsers.filter(u => u.rundenAnwesend > 0);
        
        const usersWithSollQuote = activeUsers.map(u => {
          const totalBezahltAlle = processedUsers.reduce((sum, usr) => sum + usr.rundenBezahlt, 0);
          const erwarteteRundenBezahlt = totalBezahltAlle * (u.rundenAnwesend / (totalAnwesenheiten || 1));
          return { ...u, individuelleSollQuoteInProzent: u.rundenAnwesend > 0 ? (erwarteteRundenBezahlt / u.rundenAnwesend) * 100 : 0, abweichung: u.quote - (u.rundenAnwesend > 0 ? (erwarteteRundenBezahlt / u.rundenAnwesend) * 100 : 0) };
        });

        const qualifiedUsers = usersWithSollQuote.filter(u => u.rundenAnwesend >= 10);
        const generalQualifiedForAwards = processedUsers.filter(u => u.rundenAnwesend >= 10);
        const top3Dringlichkeit = [...qualifiedUsers].sort((a, b) => a.abweichung - b.abweichung).slice(0, 3);

        const getTopUser = (field) => generalQualifiedForAwards.length > 0
          ? generalQualifiedForAwards.reduce((maxUser, u) => u[field] > maxUser[field] ? u : maxUser, generalQualifiedForAwards[0])
          : (processedUsers[0] || { name: '-', rundenBezahlt: 0, kosten: 0, rundenAnwesend: 0 });
        
        const goenner = getTopUser('rundenBezahlt');
        const dauerGast = getTopUser('rundenAnwesend');
        const pechvogel = qualifiedUsers.length > 0 ? qualifiedUsers.reduce((maxUser, u) => u.quote > maxUser.quote ? u : maxUser, qualifiedUsers[0]) : (processedUsers[0] || { name: '-', quote: 0 });
        const finanzStabilitaetUser = qualifiedUsers.length > 0 ? qualifiedUsers.reduce((closest, u) => Math.abs(u.abweichung) < Math.abs(closest.abweichung) ? u : closest, qualifiedUsers[0]) : null;

        if (errorMsg) {
          return e('div', { className: 'p-4 bg-red-50 text-red-700 rounded-2xl border border-red-200 my-4 text-xs max-w-sm mx-auto text-center' },
            e('p', { className: 'font-bold mb-1' }, 'Datenbank-Verbindungsfehler:'),
            e('p', { className: 'font-mono bg-white p-2 rounded border border-red-100 mb-2' }, errorMsg),
            e('button', { onClick: fetchData, className: 'w-full py-1.5 bg-red-600 text-white rounded font-bold' }, 'Erneut versuchen')
          );
        }

        if (loading) {
          return e('div', { className: 'flex flex-col items-center justify-center h-64 text-amber-600 font-semibold gap-2' },
            e('span', { className: 'animate-spin text-2xl' }, '☕'), 'Verbinde mit Kaffee-Cloud...'
          );
        }

        return e('div', { className: 'w-full bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-200 my-2 flex flex-col h-[95vh]' },
          e('div', { className: 'p-4 bg-gray-50 text-center border-b border-gray-200 shrink-0' },
            e('h1', { className: 'text-xl font-bold text-amber-600 flex items-center justify-center gap-2' }, '☁️ Kaffee Manager Pro Cloud'),
            e('div', { className: 'grid grid-cols-2 gap-2 mt-3 bg-gray-200 p-1 rounded-xl' },
              e('button', { onClick: () => setActiveTab('input'), className: `py-2 text-xs font-semibold rounded-lg transition-all ${activeTab === 'input' ? 'bg-white text-gray-900 shadow-sm' : 'text-gray-600'}` }, '📋 Input'),
              e('button', { onClick: () => setActiveTab('stats'), className: `py-2 text-xs font-semibold rounded-lg transition-all ${activeTab === 'stats' ? 'bg-amber-600 text-white shadow-sm' : 'text-gray-600'}` }, '📊 Stats')
            )
          ),
          e('div', { className: 'flex-1 overflow-y-auto p-4 space-y-4 bg-gray-50/50' },
            activeTab === 'input' ? [
              e('div', { key: 'prices', className: 'bg-white p-3 rounded-2xl border border-gray-200 flex justify-around text-xs shadow-sm' },
                e('div', { className: 'flex items-center gap-2' },
                  e('span', { className: 'text-amber-600 font-semibold' }, 'Espresso:'),
                  e('input', { type: 'number', step: '0.1', value: prices.espresso, onChange: (e) => handlePriceChange('espresso', e.target.value), className: 'w-12 bg-gray-50 border border-gray-300 rounded text-center font-bold text-gray-800 py-0.5' }),
                  e('span', { className: 'text-gray-500' }, 'CHF')
                ),
                e('div', { className: 'flex items-center gap-2' },
                  e('span', { className: 'text-amber-800 font-semibold' }, 'Schale:'),
                  e('input', { type: 'number', step: '0.1', value: prices.schale, onChange: (e) => handlePriceChange('schale', e.target.value), className: 'w-12 bg-gray-50 border border-gray-300 rounded text-center font-bold text-gray-800 py-0.5' }),
                  e('span', { className: 'text-gray-500' }, 'CHF')
                ),
                e('button', { onClick: fetchData, className: 'text-xs px-2 py-0.5 bg-gray-200 text-gray-600 rounded hover:bg-gray-300' }, '🔄 Sync')
              ),
              users.map(user => e('div', { key: user.id, className: 'bg-white p-4 rounded-2xl border border-gray-200 space-y-3 shadow-sm' },
                e('input', { type: 'text', value: user.name, onChange: (e) => handleNameChange(user.id, e.target.value), className: 'bg-transparent font-bold text-base text-gray-900 border-b border-transparent focus:border-amber-500 focus:outline-none w-full pb-1' }),
                e('div', { className: 'grid grid-cols-2 gap-3 text-xs' },
                  e('div', { className: 'bg-gray-50 p-2 rounded-xl border border-gray-100 flex flex-col items-center' },
                    e('span', { className: 'text-gray-500 text-[10px] font-bold mb-2' }, 'RUNDEN ANWESEND'),
                    e('div', { className: 'flex items-center justify-between w-full px-1' },
                      e('button', { onClick: () => updateCounter(user.id, 'rundenAnwesend', -1), className: 'w-10 h-10 bg-white border border-gray-300 rounded-lg text-lg font-bold' }, '-'),
                      e('span', { className: 'text-sm font-bold text-gray-800' }, user.rundenAnwesend),
                      e('button', { onClick: () => updateCounter(user.id, 'rundenAnwesend', 1), className: 'w-10 h-10 bg-white border border-gray-300 rounded-lg text-lg font-bold' }, '+')
                    )
                  ),
                  e('div', { className: 'bg-gray-50 p-2 rounded-xl border border-gray-100 flex flex-col items-center' },
                    e('span', { className: 'text-gray-500 text-[10px] font-bold mb-2' }, 'RUNDEN BEZAHLT'),
                    e('div', { className: 'flex items-center justify-between w-full px-1' },
                      e('button', { onClick: () => updateCounter(user.id, 'rundenBezahlt', -1), className: 'w-10 h-10 bg-white border border-gray-300 rounded-lg text-lg font-bold' }, '-'),
                      e('span', { className: 'text-sm font-bold text-emerald-600' }, user.rundenBezahlt),
                      e('button', { onClick: () => updateCounter(user.id, 'rundenBezahlt', 1), className: 'w-10 h-10 bg-white border border-gray-300 rounded-lg text-lg font-bold' }, '+')
                    )
                  )
                ),
                e('div', { className: 'grid grid-cols-2 gap-3 text-xs' },
                  e('div', { className: 'bg-amber-50/50 p-2 rounded-xl border border-amber-100 flex flex-col items-center' },
                    e('span', { className: 'text-amber-800 text-[10px] font-bold mb-2' }, 'ESPRESSO'),
                    e('div', { className: 'flex items-center justify-between w-full px-1' },
                      e('button', { onClick: () => updateCounter(user.id, 'espresso', -1), className: 'w-10 h-10 bg-white border border-amber-200 rounded-lg text-lg font-bold text-amber-700' }, '-'),
                      e('span', { className: 'text-sm font-bold text-gray-800' }, user.espresso),
                      e('button', { onClick: () => updateCounter(user.id, 'espresso', 1), className: 'w-10 h-10 bg-white border border-amber-200 rounded-lg text-lg font-bold text-amber-700' }, '+')
                    )
                  ),
                  e('div', { className: 'bg-orange-50/40 p-2 rounded-xl border border-orange-100 flex flex-col items-center' },
                    e('span', { className: 'text-amber-900 text-[10px] font-bold mb-2' }, 'SCHALE'),
                    e('div', { className: 'flex items-center justify-between w-full px-1' },
                      e('button', { onClick: () => updateCounter(user.id, 'schale', -1), className: 'w-10 h-10 bg-white border border-orange-200 rounded-lg text-lg font-bold text-amber-900' }, '-'),
                      e('span', { className: 'text-sm font-bold text-gray-800' }, user.schale),
                      e('button', { onClick: () => updateCounter(user.id, 'schale', 1), className: 'w-10 h-10 bg-white border border-orange-200 rounded-lg text-lg font-bold text-amber-900' }, '+')
                    )
                  )
                )
              ))
            ] : [
              e('div', { key: 'total-exp', className: 'bg-white p-4 rounded-2xl border border-gray-200 shadow-sm text-center' },
                e('span', { className: 'text-[10px] text-gray-400 font-bold block tracking-wider' }, 'AUSGABEN GESAMT'),
                e('span', { className: 'text-2xl font-black text-emerald-600' }, gesamtAusgaben.toFixed(2) + ' CHF')
              ),
              top3Dringlichkeit.length > 0 && e('div', { key: 'dringlichkeit', className: 'bg-red-50 border border-red-200 p-4 rounded-2xl shadow-sm text-xs' },
                e('span', { className: 'text-red-700 font-bold block mb-2' }, '🚨 TOP 3 ZAHLUNGS-DRINGLICHKEIT (Mind. 10 Rnd)'),
                e('div', { className: 'divide-y divide-red-200/60' },
                  top3Dringlichkeit.map((u, i) => e('div', { key: u.id, className: 'flex justify-between items-center py-1.5' },
                    e('span', { className: 'font-bold text-gray-800' }, (i + 1) + '. ' + u.name),
                    e('span', { className: 'font-semibold text-red-600 bg-white px-2 py-0.5 rounded border' }, 'Abw: ' + (u.abweichung >= 0 ? '+' : '') + u.abweichung.toFixed(0) + '%')
                  ))
                )
              ),
              e('div', { key: 'awards', className: 'bg-white p-4 rounded-2xl border border-gray-200 space-y-3 shadow-sm text-xs' },
                e('h3', { className: 'font-bold text-amber-600 border-b pb-1.5' }, '🏅 MEILENSTEINE & FUN-AWARDS (Mind. 10 Rnd)'),
                e('div', { className: 'space-y-2.5' },
                  e('div', { className: 'bg-gray-50 p-2.5 rounded-xl flex justify-between items-center border' },
                    e('div', null, e('span', { className: 'text-emerald-600 block font-bold text-[10px]' }, 'DER GÖNNER'), e('span', { className: 'font-bold text-gray-800 text-sm' }, goenner.name)),
                    e('div', { className: 'text-right' }, e('span', { className: 'text-xs font-semibold bg-white px-2 py-0.5 rounded border block' }, goenner.rundenBezahlt + ' Rnd bezahlt'), e('span', { className: 'text-[10px] text-gray-400 font-bold mt-0.5 block' }, (goenner.kosten ? goenner.kosten.toFixed(2) : '0.00') + ' CHF'))
                  ),
                  e('div', { className: 'bg-gray-50 p-2.5 rounded-xl flex justify-between items-center border' },
                    e('div', null, e('span', { className: 'text-red-500 block font-bold text-[10px]' }, 'PECHVOGEL (Höchste Zahl-Quote)'), e('span', { className: 'font-bold text-gray-800 text-sm' }, pechvogel.name)),
                    e('span', { className: 'text-xs font-semibold bg-white px-2 py-1 rounded border' }, (pechvogel.quote ? pechvogel.quote.toFixed(0) : 0) + '% Quote')
                  ),
                  finanzStabilitaetUser && e('div', { className: 'bg-gray-50 p-2.5 rounded-xl flex justify-between items-center border' },
                    e('div', null, e('span', { className: 'text-teal-600 block font-bold text-[10px]' }, 'FINANZ-STABILITÄT (Am nächsten am Soll von ' + finanzStabilitaetUser.individuelleSollQuoteInProzent.toFixed(0) + '%)'), e('span', { className: 'font-bold text-gray-800 text-sm' }, finanzStabilitaetUser.name)),
                    e('span', { className: 'text-xs font-semibold bg-white px-2 py-1 rounded border' }, (finanzStabilitaetUser.abweichung >= 0 ? '+' : '') + finanzStabilitaetUser.abweichung.toFixed(0) + '% Abw.')
                  ),
                  e('div', { className: 'bg-gray-50 p-2.5 rounded-xl flex justify-between items-center border' },
                    e('div', null, e('span', { className: 'text-purple-600 block font-bold text-[10px]' }, 'DER DAUER-GAST (Meiste Kaffeepausen)'), e('span', { className: 'font-bold text-gray-800 text-sm' }, dauerGast.name)),
                    e('span', { className: 'text-xs font-semibold bg-white px-2 py-1 rounded border' }, dauerGast.rundenAnwesend + ' Rnd anwesend')
                  )
                )
              ),
              e('div', { key: 'table', className: 'bg-white rounded-2xl border border-gray-200 overflow-hidden shadow-sm text-xs' },
                e('div', { className: 'overflow-x-auto' },
                  e('table', { className: 'w-full text-left border-collapse text-[11px]' },
                    e('thead', null, 
                      e('tr', { className: 'bg-gray-50 text-gray-500 uppercase font-bold border-b border-gray-200' },
                        e('th', { className: 'p-2.5 pl-3' }, 'Name'), e('th', { className: 'p-2.5 text-center' }, 'Anw.'), e('th', { className: 'p-2.5 text-center' }, 'Bez.'), e('th', { className: 'p-2.5 text-right' }, 'Kosten'), e('th', { className: 'p-2.5 text-right pr-3' }, 'Ø/Anw')
                      )
                    ),
                    e('tbody', { className: 'divide-y divide-gray-100' },
                      processedUsers.map(u => e('tr', { key: u.id, className: 'hover:bg-gray-50/60' },
                        e('td', { className: 'p-2.5 pl-3 font-bold text-gray-800' }, u.name),
                        e('td', { className: 'p-2.5 text-center text-gray-600' }, u.rundenAnwesend),
                        e('td', { className: 'p-2.5 text-center' }, e('span', { className: 'text-emerald-600 font-bold' }, u.rundenBezahlt), e('span', { className: 'text-gray-400 block text-[9px]' }, u.quote.toFixed(0) + '%')),
                        e('td', { className: 'p-2.5 text-right font-bold text-gray-700' }, u.kosten.toFixed(2)),
                        e('td', { className: 'p-2.5 text-right font-semibold text-amber-700 pr-3' }, u.avgProAnwesendeRunde.toFixed(2))
                      ))
                    )
                  )
                )
              )
            )
          ]
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(e(App));
    });
  </script>
</body>
</html>
